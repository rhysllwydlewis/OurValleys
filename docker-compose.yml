services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ourvalleys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ourvalleys"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ourvalleys-postgres:/var/lib/postgresql/data

volumes:
  ourvalleys-postgres:
