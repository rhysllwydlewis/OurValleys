name: One-shot public business browser diagnostic

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ourvalleys_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourvalleys_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      DATABASE_PRIVATE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      NODE_ENV: test
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      PORT: 3000
      EMAIL_TRANSPORT: console
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Prepare database and build
        run: |
          pnpm deploy:prepare
          pnpm build
      - name: Start application and capture public projection
        run: |
          pnpm start > diagnostic-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true' EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/health/ready >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:3000/b/cwm-coil-heating > browser-debug.html
          node --input-type=module <<'NODE' > browser-debug.txt
          import postgres from 'postgres';
          const sql = postgres(process.env.TEST_DATABASE_URL, { max: 1 });
          try {
            const [business] = await sql`select id, slug, status from business where slug = 'cwm-coil-heating'`;
            const offers = await sql`select title, status, starts_at, ends_at from business_offer where business_id = ${business.id}`;
            const events = await sql`select title, status, starts_at, ends_at from business_event where business_id = ${business.id}`;
            const contacts = await sql`select label, type, value, enabled, is_primary from business_contact_method where business_id = ${business.id}`;
            const entitlements = await sql`select plan_key, capabilities from business_entitlement where business_id = ${business.id}`;
            console.log(JSON.stringify({ business, offers, events, contacts, entitlements }, null, 2));
          } finally {
            await sql.end({ timeout: 1 });
          }
          NODE
          printf '\n--- SERVER LOG ---\n' >> browser-debug.txt
          tail -100 diagnostic-server.log >> browser-debug.txt
          rm diagnostic-server.log
      - name: Remove one-shot workflow
        run: rm .github/workflows/one-shot-browser-diagnostic.yml
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture public business rendering diagnostics"
          git push origin HEAD:agent/free-business-phases-7-12
