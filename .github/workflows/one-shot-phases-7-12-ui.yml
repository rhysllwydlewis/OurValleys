name: One-shot Phases 7-12 UI integration

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - name: Apply targeted integration changes
        run: python scripts/apply-phases-7-12-ui.py
      - name: Remove one-shot helpers
        run: rm scripts/apply-phases-7-12-ui.py .github/workflows/one-shot-phases-7-12-ui.yml
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Connect Phases 7-12 to existing business journeys"
          git push origin HEAD:agent/free-business-phases-7-12
