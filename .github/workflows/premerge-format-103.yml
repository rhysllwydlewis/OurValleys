name: Pre-merge format 103

on:
  push:
    branches: [agent/development-demos-news]

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[formatted-103]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/development-demos-news

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply repository formatting
        run: pnpm format

      - name: Commit exact formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Apply exact repository formatting [formatted-103]"
          git push origin HEAD:agent/development-demos-news
