name: Apply issue 11 payload

on:
  push:
    branches:
      - agent/issue-11-animated-homepage

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Expand the reviewed homepage payload
        run: |
          tar -xzf scripts/issue11-payload.tgz -C .
          rm scripts/issue11-payload.tgz
          rm .github/workflows/apply-issue11-payload.yml
      - name: Commit the expanded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/README.md src/app/page.tsx src/components/home/home.module.css scripts/issue11-payload.tgz .github/workflows/apply-issue11-payload.yml
          git commit -m "Expand the premium homepage payload"
          git push
