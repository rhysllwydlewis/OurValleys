name: Apply issue 11 payload

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/issue-11-animated-homepage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Expand the reviewed homepage payload
        run: |
          tar -xzf scripts/issue11-payload.tgz -C .
          rm scripts/issue11-payload.tgz
          rm .github/workflows/apply-issue11-payload.yml
      - name: Commit the expanded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Expand the premium homepage payload"
          git push origin HEAD:${{ github.head_ref }}
