name: One-shot PR 86 test alignment

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Align test fixtures
        run: python scripts/apply-pr86-test-alignment.py
      - name: Format repository
        run: pnpm format
      - name: Remove temporary alignment files
        run: |
          rm scripts/apply-pr86-test-alignment.py
          rm .github/workflows/one-shot-pr86-test-alignment.yml
      - name: Commit aligned tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add final operations safety coverage"
          git push origin HEAD:agent/free-business-phases-7-12
