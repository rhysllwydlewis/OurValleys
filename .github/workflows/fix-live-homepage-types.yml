name: Fix live homepage types

on:
  push:
    branches:
      - agent/stage-h-live-homepage

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage-h-live-homepage
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node scripts/fix-live-homepage-types.mjs
      - run: pnpm exec prettier --write src/app/page.tsx
      - run: |
          rm scripts/fix-live-homepage-types.mjs
          rm .github/workflows/fix-live-homepage-types.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix live homepage typed routes"
          git push
