name: Temporary news formatter

on:
  push:
    branches:
      - agent/redesign-news-page

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/redesign-news-page
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format changed news files
        run: >-
          pnpm exec prettier --write
          src/app/news/page.tsx
          src/app/news/news.module.css
          tests/e2e/news.spec.ts

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Files are already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/news/page.tsx src/app/news/news.module.css tests/e2e/news.spec.ts
          git commit -m "Format the news redesign"
          git push origin HEAD:agent/redesign-news-page
