name: Recovery format PR 119

on:
  push:
    branches:
      - agent/launch-content-operations-pack

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/launch-content-operations-pack
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable repository package manager
        run: corepack enable
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply repository-pinned formatter
        run: pnpm exec prettier --write docs/35-launch-content-operations-pack.md
      - name: Remove temporary recovery workflow
        run: rm .github/workflows/recovery-format-pr119.yml
      - name: Commit authoritative formatting output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/35-launch-content-operations-pack.md .github/workflows/recovery-format-pr119.yml
          git diff --cached --check
          git commit -m "Format launch content operations pack"
          git push origin HEAD:agent/launch-content-operations-pack
