name: PR 116 formatter recovery

on:
  push:
    branches:
      - agent/founding-business-validation-pack
    paths:
      - docs/34-founding-business-validation-pack.md
      - .github/workflows/pr-116-format-recovery.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out recovery branch
        uses: actions/checkout@v4
        with:
          ref: agent/founding-business-validation-pack
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply repository-pinned formatter
        run: pnpm exec prettier --write docs/34-founding-business-validation-pack.md

      - name: Verify formatter result
        run: pnpm exec prettier --check docs/34-founding-business-validation-pack.md

      - name: Remove temporary workflow and push exact output
        run: |
          rm .github/workflows/pr-116-format-recovery.yml
          git config user.name "OurValleys PR Recovery"
          git config user.email "actions@users.noreply.github.com"
          git add docs/34-founding-business-validation-pack.md .github/workflows/pr-116-format-recovery.yml
          if git diff --cached --quiet; then
            echo "No formatter changes were required."
            exit 1
          fi
          git commit -m "Format founding business validation pack"
          git push origin HEAD:agent/founding-business-validation-pack
