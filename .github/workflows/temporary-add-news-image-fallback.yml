name: Temporary news image fallback refinement

on:
  push:
    branches:
      - agent/polish-news-images

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/polish-news-images
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Add resilient generated-art fallbacks
        run: |
          python - <<'PY'
          from pathlib import Path

          page_path = Path("src/app/news/page.tsx")
          page = page_path.read_text()

          page = page.replace('import Image from "next/image";\n', '')
          page = page.replace(
              'import { SiteFooter } from "@/components/site-footer";\n',
              'import { PublisherFeedImage } from "@/components/publisher-feed-image";\nimport { SiteFooter } from "@/components/site-footer";\n',
              1,
          )

          old_landscape = '''function LandscapeArtwork({ item }: { item: WalesOnlineNewsItem | undefined }) {\n  if (item && hasUsableImage(item)) {\n    return (\n      <div className={polishStyles.heroMedia} aria-hidden="true">\n        <Image\n          className={polishStyles.feedImage}\n          src={item.imageUrl}\n          alt=""\n          fill\n          priority\n          unoptimized\n          sizes="(max-width: 70rem) calc(100vw - 2.5rem), 54vw"\n          referrerPolicy="no-referrer"\n        />\n      </div>\n    );\n  }\n\n  return (\n    <div className={styles.landscape} aria-hidden="true">\n      <span className={styles.landscapeSun} />\n      <span className={styles.landscapeRidgeFar} />\n      <span className={styles.landscapeRidgeNear} />\n      <span className={styles.landscapeTown} />\n      <span className={styles.landscapeChurch} />\n      <span className={styles.landscapeMist} />\n    </div>\n  );\n}\n'''
          new_landscape = '''function LandscapeFallback({ embedded = false }: { embedded?: boolean }) {\n  return (\n    <div\n      className={`${styles.landscape} ${embedded ? polishStyles.heroFallback : ""}`}\n      aria-hidden="true"\n    >\n      <span className={styles.landscapeSun} />\n      <span className={styles.landscapeRidgeFar} />\n      <span className={styles.landscapeRidgeNear} />\n      <span className={styles.landscapeTown} />\n      <span className={styles.landscapeChurch} />\n      <span className={styles.landscapeMist} />\n    </div>\n  );\n}\n\nfunction LandscapeArtwork({ item }: { item: WalesOnlineNewsItem | undefined }) {\n  if (item && hasUsableImage(item)) {\n    return (\n      <div className={polishStyles.heroMedia} aria-hidden="true">\n        <LandscapeFallback embedded />\n        <PublisherFeedImage\n          className={polishStyles.feedImage}\n          src={item.imageUrl}\n          priority\n          sizes="(max-width: 70rem) calc(100vw - 2.5rem), 54vw"\n        />\n      </div>\n    );\n  }\n\n  return <LandscapeFallback />;\n}\n'''
          if old_landscape not in page:
              raise SystemExit("Expected LandscapeArtwork block not found")
          page = page.replace(old_landscape, new_landscape, 1)

          old_story = '''  return (\n    <div\n      className={`${polishStyles.storyMedia} ${featured ? polishStyles.featuredMedia : ""}`}\n      aria-hidden="true"\n    >\n      <Image\n        className={polishStyles.feedImage}\n        src={item.imageUrl}\n        alt=""\n        fill\n        unoptimized\n        loading={featured ? "eager" : "lazy"}\n        sizes={\n          featured\n            ? "(max-width: 70rem) calc(100vw - 4rem), 54vw"\n            : "(max-width: 38rem) 38vw, (max-width: 54rem) 50vw, (max-width: 70rem) 33vw, 25vw"\n        }\n        referrerPolicy="no-referrer"\n      />\n    </div>\n  );\n'''
          new_story = '''  return (\n    <div\n      className={`${polishStyles.storyMedia} ${featured ? polishStyles.featuredMedia : ""}`}\n      aria-hidden="true"\n    >\n      <StoryArtwork category={category} featured={featured} />\n      <PublisherFeedImage\n        className={polishStyles.feedImage}\n        src={item.imageUrl}\n        priority={featured}\n        sizes={\n          featured\n            ? "(max-width: 70rem) calc(100vw - 4rem), 54vw"\n            : "(max-width: 38rem) 38vw, (max-width: 54rem) 50vw, (max-width: 70rem) 33vw, 25vw"\n        }\n      />\n    </div>\n  );\n'''
          if old_story not in page:
              raise SystemExit("Expected StoryMedia image block not found")
          page = page.replace(old_story, new_story, 1)
          page_path.write_text(page)

          css_path = Path("src/app/news/news-polish.module.css")
          css = css_path.read_text()
          css = css.replace('  z-index: 1;\n  background: linear-gradient', '  z-index: 2;\n  background: linear-gradient', 1)
          css = css.replace(
              '''.feedImage {\n  color: transparent;\n''',
              '''.feedImage {\n  z-index: 1;\n  color: transparent;\n''',
              1,
          )
          css = css.replace(
              '''.storyMedia {\n  min-height: 12rem;\n''',
              '''.heroFallback {\n  min-height: inherit;\n  border: 0;\n  border-radius: inherit;\n  box-shadow: none;\n}\n\n.storyMedia {\n  min-height: 12rem;\n''',
              1,
          )
          css_path.write_text(css)
          PY

      - name: Format fallback files
        run: >-
          pnpm exec prettier --write
          src/app/news/page.tsx
          src/app/news/news-polish.module.css
          src/components/publisher-feed-image.tsx
          tests/e2e/news.spec.ts

      - name: Commit fallback refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/news/page.tsx src/app/news/news-polish.module.css src/components/publisher-feed-image.tsx tests/e2e/news.spec.ts
          git commit -m "Fall back cleanly when publisher images fail"
          git push origin HEAD:agent/polish-news-images
