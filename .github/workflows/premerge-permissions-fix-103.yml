name: Pre-merge permissions fix 103

on:
  push:
    branches: [agent/development-demos-news]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[permissions-fixed]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/development-demos-news

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply permissions and scanner fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              content = file_path.read_text()
              if old not in content:
                  raise SystemExit(f"Expected text not found in {path}")
              file_path.write_text(content.replace(old, new, 1))

          replace_once(
              "src/lib/demo-account.ts",
              "export const publicDemoNotice = publicDemoAccount.notice;",
              '''const publicDemoEmailSet: ReadonlySet<string> = new Set(
  publicDemoAccounts.map(({ email }) => email),
);

export function isPublicDemoEmail(email: string | null | undefined): boolean {
  if (!email) return false;
  return publicDemoEmailSet.has(email.trim().toLowerCase());
}

export const publicDemoNotice = publicDemoAccount.notice;''',
          )

          replace_once(
              "src/app/account/new-business/actions.ts",
              'import { publicDemoAccount } from "@/lib/demo-account";',
              'import { isPublicDemoEmail } from "@/lib/demo-account";',
          )
          replace_once(
              "src/app/account/new-business/actions.ts",
              '''    // The shared public demonstration account is view-only by design and
    // must not be able to create real records.
    if (session.user.email === publicDemoAccount.email) return null;''',
              '''    // Every intentionally public demonstration account is restricted to
    // its supplied journey and must never create additional business records.
    if (isPublicDemoEmail(session.user.email)) return null;''',
          )

          replace_once(
              "src/app/account/new-business/page.tsx",
              'import { publicDemoAccount } from "@/lib/demo-account";',
              'import { isPublicDemoEmail } from "@/lib/demo-account";',
          )
          replace_once(
              "src/app/account/new-business/page.tsx",
              "  const isDemoAccount = session.user.email === publicDemoAccount.email;",
              "  const isDemoAccount = isPublicDemoEmail(session.user.email);",
          )
          replace_once(
              "src/app/account/new-business/page.tsx",
              "<h2>The public demo account cannot create businesses.</h2>",
              "<h2>Public demo accounts cannot create businesses.</h2>",
          )

          replace_once(
              "src/app/account/new-business/new-business-form.tsx",
              "The public demonstration account cannot create businesses.",
              "Public demonstration accounts cannot create businesses.",
          )

          replace_once(
              "src/app/account/page.tsx",
              'import { getAuth } from "@/lib/auth";\nimport { getAvatarTone, getInitials } from "@/lib/initials";',
              'import { getAuth } from "@/lib/auth";\nimport { isPublicDemoEmail } from "@/lib/demo-account";\nimport { getAvatarTone, getInitials } from "@/lib/initials";',
          )
          replace_once(
              "src/app/account/page.tsx",
              '''  const session = await readSession();
  if (!session) redirect("/login?next=/account");

  const businessAccess''',
              '''  const session = await readSession();
  if (!session) redirect("/login?next=/account");

  const isPublicDemoAccount = isPublicDemoEmail(session.user.email);
  const businessAccess''',
          )
          replace_once(
              "src/app/account/page.tsx",
              '''            <p className={styles.sectionHint}>
              Server-verified membership, checked on every request.{" "}
              <Link href={"/account/new-business" as Route}>
                Create another business
              </Link>
            </p>''',
              '''            <p className={styles.sectionHint}>
              {isPublicDemoAccount ? (
                "Public demo accounts are limited to their supplied access."
              ) : (
                <>
                  Server-verified membership, checked on every request.{" "}
                  <Link href={"/account/new-business" as Route}>
                    Create another business
                  </Link>
                </>
              )}
            </p>''',
          )
          replace_once(
              "src/app/account/page.tsx",
              ''') : businesses.length === 0 ? (
            <div className={styles.stateCard}>''',
              ''') : isPublicDemoAccount && businesses.length === 0 ? (
            <div className={styles.stateCard} role="note">
              <span className={styles.stateIcon} aria-hidden="true">
                <ShieldIcon />
              </span>
              <div>
                <h3>This demonstration has no business dashboards.</h3>
                <p>
                  Public demo accounts cannot create additional business records.
                  Use a private account for a real business journey.
                </p>
              </div>
            </div>
          ) : businesses.length === 0 ? (
            <div className={styles.stateCard}>''',
          )

          replace_once(
              "src/modules/news/rss.ts",
              "    if (url.username || url.password || url.port) return null;",
              '''    const authorityPrefix = url.href.slice(0, url.href.indexOf(url.hostname));
    if (url.username || authorityPrefix.includes("@") || url.port) return null;''',
          )
          replace_once(
              "tests/unit/wales-online-news.test.ts",
              '''    <item>
      <title>Credential-bearing source</title>
      <link>https://reader:password@www.walesonline.co.uk/news/unsafe</link>
    </item>''',
              '''    <item>
      <title>User-info source</title>
      <link>https://reader@www.walesonline.co.uk/news/unsafe</link>
    </item>''',
          )

          replace_once(
              "tests/unit/development-demo-accounts.test.ts",
              '''  publicDemoAccount,
  publicDemoAccounts,
} from "../../src/lib/demo-account";''',
              '''  publicDemoAccount,
  publicDemoAccounts,
  isPublicDemoEmail,
} from "../../src/lib/demo-account";''',
          )
          replace_once(
              "tests/unit/development-demo-accounts.test.ts",
              '''  it("routes each role to the protected journey it is intended to demonstrate", () => {''',
              '''  it("recognises every public demo email and no ordinary account", () => {
    for (const account of publicDemoAccounts) {
      expect(isPublicDemoEmail(account.email)).toBe(true);
      expect(isPublicDemoEmail(account.email.toUpperCase())).toBe(true);
    }
    expect(isPublicDemoEmail("person@example.test")).toBe(false);
    expect(isPublicDemoEmail(null)).toBe(false);
  });

  it("routes each role to the protected journey it is intended to demonstrate", () => {''',
          )

          replace_once(
              "tests/e2e/development-demo-access.spec.ts",
              '''  await expect(page.getByText("View only", { exact: true })).toHaveCount(0);
});''',
              '''  await expect(page.getByText("View only", { exact: true })).toHaveCount(0);

  await page.goto("/account/new-business");
  await expect(
    page.getByRole("heading", {
      name: "Public demo accounts cannot create businesses.",
    }),
  ).toBeVisible();
  await expect(
    page.getByRole("button", { name: "Create my starter website" }),
  ).toHaveCount(0);
});''',
          )
          replace_once(
              "tests/e2e/development-demo-access.spec.ts",
              '''  await expect(
    page.getByRole("navigation", { name: "Admin sections" }),
  ).toBeVisible();
});''',
              '''  await expect(
    page.getByRole("navigation", { name: "Admin sections" }),
  ).toBeVisible();

  await page.goto("/account/new-business");
  await expect(
    page.getByRole("heading", {
      name: "Public demo accounts cannot create businesses.",
    }),
  ).toBeVisible();
  await expect(
    page.getByRole("button", { name: "Create my starter website" }),
  ).toHaveCount(0);
});''',
          )

          replace_once(
              "docs/33-development-demo-and-external-news.md",
              '''Selecting a fill button copies the chosen credentials into the form but never submits automatically. After successful authentication, the viewer opens `/account`, the business owner opens the seeded business dashboard, and the administrator opens `/admin`.''',
              '''Selecting a fill button copies the chosen credentials into the form but never submits automatically. After successful authentication, the viewer opens `/account`, the business owner opens the seeded business dashboard, and the administrator opens `/admin`.

Every public demo is denied access to creating additional business records. This is enforced in the account interface, the new-business page and the server action rather than relying on hidden navigation alone.''',
          )
          PY

      - name: Format and verify focused changes
        run: |
          pnpm format
          pnpm lint
          pnpm typecheck
          pnpm exec vitest run tests/unit/wales-online-news.test.ts tests/unit/development-demo-accounts.test.ts

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Block all public demos from business creation [permissions-fixed]"
          git push origin HEAD:agent/development-demos-news
