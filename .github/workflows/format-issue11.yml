name: Format issue 11 branch

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/issue-11-animated-homepage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable the repository package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply the repository formatter
        run: pnpm format
      - name: Commit formatter output
        run: |
          rm .github/workflows/format-issue11.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format the premium homepage implementation"
          git push origin HEAD:${{ github.head_ref }}
