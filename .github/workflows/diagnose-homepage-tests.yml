name: Diagnose homepage tests

on:
  push:
    branches:
      - agent/homepage-local-identity-refinement

permissions:
  contents: read

concurrency:
  group: diagnose-homepage-tests
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ourvalleys_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourvalleys_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ourvalleys_test
      BETTER_AUTH_SECRET: diagnostic-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/homepage-local-identity-refinement

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm db:migrate
          pnpm db:seed
          pnpm auth:provision-demo

      - name: Run tests and preserve complete output
        shell: bash
        run: |
          set +e
          pnpm test -- --reporter=verbose 2>&1 | tee unit-test.log
          status=${PIPESTATUS[0]}
          echo "$status" > unit-test-status.txt
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: homepage-unit-test-diagnostic
          path: |
            unit-test.log
            unit-test-status.txt
          if-no-files-found: error
          retention-days: 2
