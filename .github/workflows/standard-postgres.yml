name: Standard PostgreSQL compatibility

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: standard-postgres-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-homepage-review-fixes:
    if: github.head_ref == 'agent/homepage-experience-overhaul' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/homepage-experience-overhaul

      - name: Apply reviewed homepage sources
        shell: bash
        run: |
          cat .github/homepage-build/page.tsx.gz.b64.part00 .github/homepage-build/page.tsx.gz.b64.part01 | base64 --decode | gzip --decompress > src/app/page.tsx
          base64 --decode .github/homepage-build/home-overhaul.module.css.gz.b64 | gzip --decompress > src/components/home/home-overhaul.module.css
          rm -rf .github/homepage-build
          rm .github/workflows/format-homepage-review-fixes.yml

      - name: Commit reviewed homepage sources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github/homepage-build .github/workflows/format-homepage-review-fixes.yml src/app/page.tsx src/components/home/home-overhaul.module.css
          git commit -m "Address homepage review findings"
          git push origin HEAD:agent/homepage-experience-overhaul
