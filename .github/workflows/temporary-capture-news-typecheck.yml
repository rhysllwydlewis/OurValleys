name: Temporary news typecheck diagnostic

on:
  push:
    branches:
      - agent/polish-news-images

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/polish-news-images
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture typecheck output
        run: pnpm typecheck > temporary-news-typecheck.log 2>&1 || true

      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add temporary-news-typecheck.log
          git commit -m "Capture temporary news typecheck diagnostic"
          git push origin HEAD:agent/polish-news-images
