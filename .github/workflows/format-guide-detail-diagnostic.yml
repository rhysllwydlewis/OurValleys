name: Format guide detail diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-guide-detail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --write 'src/app/guides/[slug]/page.tsx'
      - run: |
          mkdir -p formatted
          cp 'src/app/guides/[slug]/page.tsx' formatted/guide-detail.tsx
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-guide-detail
          path: formatted/guide-detail.tsx
