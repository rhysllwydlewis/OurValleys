name: Format homepage browser contract

on:
  push:
    branches:
      - agent/stage-h-live-homepage

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage-h-live-homepage
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --write tests/e2e/homepage-overhaul.spec.ts
      - run: |
          rm .github/workflows/format-homepage-browser-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format homepage browser contract"
          git push
