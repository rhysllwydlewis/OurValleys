name: One-shot test diagnostics

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ourvalleys_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourvalleys_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      EMAIL_TRANSPORT: console
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Prepare database
        run: pnpm deploy:prepare
      - name: Capture test diagnostics
        shell: bash
        run: |
          set +e
          pnpm test > test-diagnostics.txt 2>&1
          code=$?
          printf '\nTEST_EXIT_CODE=%s\n' "$code" >> test-diagnostics.txt
          exit 0
      - name: Remove temporary workflow
        run: rm .github/workflows/one-shot-test-diagnostics.yml
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture failing test diagnostics"
          git push origin HEAD:agent/free-business-phases-7-12
