name: Pre-merge hardening 103

on:
  push:
    branches: [agent/development-demos-news]

permissions:
  contents: write

jobs:
  harden:
    if: ${{ !contains(github.event.head_commit.message, '[premerge-hardening]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/development-demos-news

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply pre-merge hardening
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              content = file_path.read_text()
              if old not in content:
                  raise SystemExit(f"Expected text not found in {path}")
              file_path.write_text(content.replace(old, new, 1))

          replace_once(
              "src/components/auth/sign-in-form.tsx",
              '    const password = formRef.current.elements.namedItem("password");\n    if (!(email instanceof HTMLInputElement)) return;\n    if (!(password instanceof HTMLInputElement)) return;\n\n    email.value = publicDemo.email;\n    password.value = publicDemo.password;',
              '    const password = formRef.current.elements.namedItem("password");\n    const rememberMe = formRef.current.elements.namedItem("rememberMe");\n    if (!(email instanceof HTMLInputElement)) return;\n    if (!(password instanceof HTMLInputElement)) return;\n\n    email.value = publicDemo.email;\n    password.value = publicDemo.password;\n    if (rememberMe instanceof HTMLInputElement) rememberMe.checked = false;',
          )
          replace_once(
              "src/components/auth/sign-in-form.tsx",
              '              className={styles.demo}\n              aria-labelledby={`${idPrefix}-${publicDemo.key}-demo-title`}',
              '              className={styles.demo}\n              data-privileged={publicDemo.key !== "viewer" ? "true" : undefined}\n              aria-labelledby={`${idPrefix}-${publicDemo.key}-demo-title`}',
          )
          replace_once(
              "src/components/auth/sign-in-form.module.css",
              '.demo {\n  display: grid;\n  gap: 0.7rem;\n  border: 1px solid color-mix(in srgb, var(--ov-primary) 22%, var(--ov-border));\n  border-radius: 1rem;\n  padding: 1rem;\n  background: color-mix(in srgb, var(--ov-primary-soft) 52%, #fff);\n}\n',
              '.demo {\n  display: grid;\n  gap: 0.7rem;\n  border: 1px solid color-mix(in srgb, var(--ov-primary) 22%, var(--ov-border));\n  border-radius: 1rem;\n  padding: 1rem;\n  background: color-mix(in srgb, var(--ov-primary-soft) 52%, #fff);\n}\n\n.demo[data-privileged="true"] {\n  border-color: color-mix(in srgb, #9a4d00 42%, var(--ov-border));\n  background: color-mix(in srgb, #fff3df 72%, #fff);\n}\n\n.demo[data-privileged="true"] .demoEyebrow {\n  color: #7c3f00;\n}\n',
          )
          replace_once(
              "tests/e2e/development-demo-access.spec.ts",
              '  await expect(page.getByLabel("Password")).toHaveValue(\n    publicBusinessDemoAccount.password,\n  );\n\n  await page.getByRole("button", { name: "Sign in", exact: true }).click();',
              '  await expect(page.getByLabel("Password")).toHaveValue(\n    publicBusinessDemoAccount.password,\n  );\n  await expect(\n    page.getByLabel("Keep me signed in on this device"),\n  ).not.toBeChecked();\n\n  await page.getByRole("button", { name: "Sign in", exact: true }).click();',
          )
          replace_once(
              "tests/e2e/development-demo-access.spec.ts",
              '  await expect(page.getByLabel("Password")).toHaveValue(\n    publicAdminDemoAccount.password,\n  );\n\n  await page.getByRole("button", { name: "Sign in", exact: true }).click();',
              '  await expect(page.getByLabel("Password")).toHaveValue(\n    publicAdminDemoAccount.password,\n  );\n  await expect(\n    page.getByLabel("Keep me signed in on this device"),\n  ).not.toBeChecked();\n\n  await page.getByRole("button", { name: "Sign in", exact: true }).click();',
          )
          replace_once(
              "docs/33-development-demo-and-external-news.md",
              'The News route reads:\n\n```text\nhttps://www.walesonline.co.uk/news/?service=rss\n```',
              'The News route tries the product-owner supplied section feed first and uses the current WalesOnline whole-site RSS endpoint only as a resilience fallback:\n\n```text\nhttps://www.walesonline.co.uk/news/?service=rss\nhttps://www.walesonline.co.uk/?service=rss\n```',
          )
          PY

          cat > src/modules/news/rss.ts <<'EOF'
          export const MAX_RSS_BYTES = 2_000_000;
          const DEFAULT_ITEM_LIMIT = 12;
          const MAX_ITEM_LIMIT = 30;
          const WALES_ONLINE_HOSTS = new Set([
            "walesonline.co.uk",
            "www.walesonline.co.uk",
          ]);

          export type WalesOnlineNewsItem = {
            id: string;
            title: string;
            url: string;
            publishedAt: Date | null;
          };

          function decodeXmlEntities(value: string): string {
            const namedEntities: Record<string, string> = {
              amp: "&",
              apos: "'",
              gt: ">",
              hellip: "…",
              ldquo: "“",
              lsquo: "‘",
              lt: "<",
              mdash: "—",
              nbsp: " ",
              ndash: "–",
              quot: '"',
              rdquo: "”",
              rsquo: "’",
            };

            return value.replace(
              /&(#x?[0-9a-f]+|amp|apos|gt|hellip|ldquo|lsquo|lt|mdash|nbsp|ndash|quot|rdquo|rsquo);/gi,
              (match, entity: string) => {
                if (!entity.startsWith("#")) {
                  return namedEntities[entity.toLowerCase()] ?? match;
                }

                const isHex = entity[1]?.toLowerCase() === "x";
                const parsed = Number.parseInt(
                  entity.slice(isHex ? 2 : 1),
                  isHex ? 16 : 10,
                );
                if (
                  !Number.isSafeInteger(parsed) ||
                  parsed <= 0 ||
                  parsed > 0x10ffff ||
                  (parsed >= 0xd800 && parsed <= 0xdfff)
                ) {
                  return match;
                }

                return String.fromCodePoint(parsed);
              },
            );
          }

          function cleanFeedText(value: string | null): string {
            if (!value) return "";

            return decodeXmlEntities(
              value
                .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/gi, "$1")
                .replace(/<[^>]+>/g, " "),
            )
              .replace(/\s+/g, " ")
              .trim();
          }

          function readTag(itemXml: string, tagName: string): string | null {
            const escapedTag = tagName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const match = itemXml.match(
              new RegExp(
                `<${escapedTag}(?:\\s[^>]*)?>([\\s\\S]*?)<\\/${escapedTag}>`,
                "i",
              ),
            );
            return match?.[1] ?? null;
          }

          function normaliseWalesOnlineUrl(rawValue: string | null): string | null {
            const candidate = cleanFeedText(rawValue);
            if (!candidate) return null;

            try {
              const url = new URL(candidate);
              if (!WALES_ONLINE_HOSTS.has(url.hostname.toLowerCase())) return null;
              if (url.protocol !== "http:" && url.protocol !== "https:") return null;
              if (url.username || url.password || url.port) return null;

              url.protocol = "https:";
              url.hash = "";
              return url.toString();
            } catch {
              return null;
            }
          }

          function parsePublishedAt(rawValue: string | null): Date | null {
            const candidate = cleanFeedText(rawValue);
            if (!candidate) return null;
            const value = new Date(candidate);
            return Number.isNaN(value.getTime()) ? null : value;
          }

          export function parseWalesOnlineRss(
            xml: string,
            requestedLimit = DEFAULT_ITEM_LIMIT,
          ): WalesOnlineNewsItem[] {
            if (new TextEncoder().encode(xml).byteLength > MAX_RSS_BYTES) {
              throw new Error("The WalesOnline RSS response exceeded the accepted size.");
            }

            const limit = Math.min(
              MAX_ITEM_LIMIT,
              Math.max(1, Math.trunc(requestedLimit) || DEFAULT_ITEM_LIMIT),
            );
            const items: WalesOnlineNewsItem[] = [];
            const seenUrls = new Set<string>();
            const itemPattern = /<item(?:\s[^>]*)?>([\s\S]*?)<\/item>/gi;

            for (const match of xml.matchAll(itemPattern)) {
              const itemXml = match[1] ?? "";
              const title = cleanFeedText(readTag(itemXml, "title")).slice(0, 220);
              const url = normaliseWalesOnlineUrl(readTag(itemXml, "link"));

              if (!title || !url || seenUrls.has(url)) continue;

              items.push({
                id: url,
                title,
                url,
                publishedAt: parsePublishedAt(readTag(itemXml, "pubDate")),
              });
              seenUrls.add(url);

              if (items.length >= limit) break;
            }

            return items;
          }
          EOF

          cat > src/modules/news/wales-online.ts <<'EOF'
          import "server-only";
          import {
            MAX_RSS_BYTES,
            parseWalesOnlineRss,
            type WalesOnlineNewsItem,
          } from "@/modules/news/rss";

          export const WALES_ONLINE_RSS_URL =
            "https://www.walesonline.co.uk/news/?service=rss";
          export const WALES_ONLINE_RSS_FALLBACK_URL =
            "https://www.walesonline.co.uk/?service=rss";
          export const WALES_ONLINE_RSS_URLS = [
            WALES_ONLINE_RSS_URL,
            WALES_ONLINE_RSS_FALLBACK_URL,
          ] as const;

          const RSS_REVALIDATE_SECONDS = 15 * 60;
          const RSS_TIMEOUT_MILLISECONDS = 6_000;

          export type WalesOnlineNewsResult = {
            state: "ready" | "unavailable";
            items: WalesOnlineNewsItem[];
            fetchedAt: Date;
          };

          type WalesOnlineNewsOptions = {
            fetchImplementation?: typeof fetch;
            now?: () => Date;
          };

          async function readRssBody(response: Response): Promise<string | null> {
            const declaredLength = Number.parseInt(
              response.headers.get("content-length") ?? "",
              10,
            );
            if (Number.isFinite(declaredLength) && declaredLength > MAX_RSS_BYTES) {
              return null;
            }

            const body = await response.arrayBuffer();
            if (body.byteLength > MAX_RSS_BYTES) return null;

            const xml = new TextDecoder().decode(body);
            return /<(?:rss|feed)\b/i.test(xml) ? xml : null;
          }

          export async function listWalesOnlineNews(
            options: WalesOnlineNewsOptions = {},
          ): Promise<WalesOnlineNewsResult> {
            const fetchImplementation = options.fetchImplementation ?? fetch;
            const now = options.now ?? (() => new Date());

            for (const feedUrl of WALES_ONLINE_RSS_URLS) {
              try {
                const response = await fetchImplementation(feedUrl, {
                  headers: {
                    Accept:
                      "application/rss+xml, application/xml;q=0.9, text/xml;q=0.8",
                    "User-Agent": "OurValleys development RSS headline reader",
                  },
                  next: { revalidate: RSS_REVALIDATE_SECONDS },
                  signal: AbortSignal.timeout(RSS_TIMEOUT_MILLISECONDS),
                });

                if (!response.ok) continue;
                const xml = await readRssBody(response);
                if (!xml) continue;

                return {
                  state: "ready",
                  items: parseWalesOnlineRss(xml),
                  fetchedAt: now(),
                };
              } catch {
                continue;
              }
            }

            return { state: "unavailable", items: [], fetchedAt: now() };
          }
          EOF

          cat > tests/unit/wales-online-news.test.ts <<'EOF'
          import { describe, expect, it, vi } from "vitest";
          import { parseWalesOnlineRss } from "../../src/modules/news/rss";
          import {
            listWalesOnlineNews,
            WALES_ONLINE_RSS_URLS,
          } from "../../src/modules/news/wales-online";

          const sampleFeed = `<?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0">
            <channel>
              <title>WalesOnline News</title>
              <item>
                <title>RCT &amp; Valleys update</title>
                <link>http://www.walesonline.co.uk/news/wales-news/example-story-123#comments</link>
                <guid>story-123</guid>
                <pubDate>Wed, 22 Jul 2026 12:30:00 GMT</pubDate>
              </item>
              <item>
                <title>Duplicate story</title>
                <link>https://www.walesonline.co.uk/news/wales-news/example-story-123</link>
                <guid>duplicate</guid>
              </item>
              <item>
                <title><![CDATA[<strong>Second</strong>&nbsp;local &ndash; headline]]></title>
                <link>https://walesonline.co.uk/news/local-news/second-story-456</link>
                <guid>story-456</guid>
                <pubDate>not-a-date</pubDate>
              </item>
              <item>
                <title>Untrusted source</title>
                <link>https://example.com/copied-story</link>
              </item>
              <item>
                <title>Credential-bearing source</title>
                <link>https://reader:password@www.walesonline.co.uk/news/unsafe</link>
              </item>
              <item>
                <title>Unexpected port</title>
                <link>https://www.walesonline.co.uk:444/news/unsafe</link>
              </item>
            </channel>
          </rss>`;

          describe("WalesOnline RSS parsing", () => {
            it("returns only unique, source-validated headline records", () => {
              const items = parseWalesOnlineRss(sampleFeed);

              expect(items).toHaveLength(2);
              expect(items[0]).toEqual({
                id: "https://www.walesonline.co.uk/news/wales-news/example-story-123",
                title: "RCT & Valleys update",
                url: "https://www.walesonline.co.uk/news/wales-news/example-story-123",
                publishedAt: new Date("2026-07-22T12:30:00.000Z"),
              });
              expect(items[1]).toEqual({
                id: "https://walesonline.co.uk/news/local-news/second-story-456",
                title: "Second local – headline",
                url: "https://walesonline.co.uk/news/local-news/second-story-456",
                publishedAt: null,
              });
            });

            it("honours a bounded result limit", () => {
              expect(parseWalesOnlineRss(sampleFeed, 1)).toHaveLength(1);
              expect(parseWalesOnlineRss(sampleFeed, 0)).toHaveLength(2);
            });

            it("rejects unexpectedly large feed responses", () => {
              expect(() => parseWalesOnlineRss("x".repeat(2_000_001))).toThrow(
                "exceeded the accepted size",
              );
            });
          });

          describe("WalesOnline RSS retrieval", () => {
            it("tries the supplied section feed before the resilience fallback", async () => {
              const fetchMock = vi
                .fn()
                .mockResolvedValueOnce(new Response("Unavailable", { status: 503 }))
                .mockResolvedValueOnce(
                  new Response(sampleFeed, {
                    status: 200,
                    headers: { "content-type": "application/rss+xml" },
                  }),
                );
              const checkedAt = new Date("2026-07-22T18:00:00.000Z");

              const result = await listWalesOnlineNews({
                fetchImplementation: fetchMock as unknown as typeof fetch,
                now: () => checkedAt,
              });

              expect(fetchMock.mock.calls.map(([url]) => url)).toEqual(
                WALES_ONLINE_RSS_URLS,
              );
              expect(result.state).toBe("ready");
              expect(result.items).toHaveLength(2);
              expect(result.fetchedAt).toBe(checkedAt);
            });

            it("returns an honest unavailable state for invalid or oversized responses", async () => {
              const fetchMock = vi
                .fn()
                .mockResolvedValueOnce(
                  new Response("<html>Not RSS</html>", { status: 200 }),
                )
                .mockResolvedValueOnce(
                  new Response("", {
                    status: 200,
                    headers: { "content-length": "2000001" },
                  }),
                );

              const result = await listWalesOnlineNews({
                fetchImplementation: fetchMock as unknown as typeof fetch,
              });

              expect(result).toMatchObject({ state: "unavailable", items: [] });
              expect(fetchMock).toHaveBeenCalledTimes(WALES_ONLINE_RSS_URLS.length);
            });
          });
          EOF

      - name: Format and verify focused changes
        run: |
          pnpm format
          pnpm typecheck
          pnpm exec vitest run tests/unit/wales-online-news.test.ts tests/unit/development-demo-accounts.test.ts

      - name: Commit hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Harden public demos and WalesOnline feed [premerge-hardening]"
          git push origin HEAD:agent/development-demos-news
