name: Patch operation reads 106

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.pull_request.head.sha, '[operation-read-scope]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/development-demos-news

      - name: Scope private operations reads to matching permissions
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/app/dashboard/business/[businessId]/operations/page.tsx")
          content = path.read_text()
          old = '''  const [
            canContacts,
            canEnquiries,
            canContent,
            canLifecycle,
            canPublish,
            canAnalytics,
            memberships,
            contacts,
            enquiries,
            offers,
            events,
            menu,
            categorySections,
            menuDocument,
            lifecycle,
            eligibility,
            analytics,
            entitlement,
          ] = await Promise.all([
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageContacts,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageEnquiries,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageContent,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageLifecycle,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.publish,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.viewAnalytics,
            }),
            listAccessibleBusinesses(session.user.id),
            listBusinessContactMethods(businessId),
            listBusinessEnquiries(businessId),
            listBusinessOffers(businessId),
            listBusinessEvents(businessId),
            listBusinessMenu(businessId),
            listCategorySections(businessId),
            getBusinessMenuDocument(businessId),
            ensureBusinessLifecycle(businessId),
            getAutomaticPublicationEligibility(businessId),
            getBusinessAnalyticsSummary(businessId),
            getBusinessEntitlement(businessId),
          ]);'''
          new = '''  const [
            canContacts,
            canEnquiries,
            canContent,
            canLifecycle,
            canPublish,
            canAnalytics,
            memberships,
          ] = await Promise.all([
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageContacts,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageEnquiries,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageContent,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.manageLifecycle,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.publish,
            }),
            canUserAccessBusiness({
              userId: session.user.id,
              businessId,
              permission: businessPermissions.viewAnalytics,
            }),
            listAccessibleBusinesses(session.user.id),
          ]);

          const canReadLifecycle = canLifecycle || canPublish;
          const canAccessOperations =
            canContacts ||
            canEnquiries ||
            canContent ||
            canReadLifecycle ||
            canAnalytics;
          if (!canAccessOperations) notFound();

          // Private operational records are queried only when the matching
          // permission is present. Empty safe values keep the page structure
          // predictable without loading or exposing another capability's data.
          const [
            contacts,
            enquiries,
            offers,
            events,
            menu,
            categorySections,
            menuDocument,
            lifecycle,
            eligibility,
            analytics,
            entitlement,
          ] = await Promise.all([
            canContacts ? listBusinessContactMethods(businessId) : Promise.resolve([]),
            canEnquiries ? listBusinessEnquiries(businessId) : Promise.resolve([]),
            canContent ? listBusinessOffers(businessId) : Promise.resolve([]),
            canContent ? listBusinessEvents(businessId) : Promise.resolve([]),
            canContent ? listBusinessMenu(businessId) : Promise.resolve([]),
            canContent ? listCategorySections(businessId) : Promise.resolve([]),
            canContent ? getBusinessMenuDocument(businessId) : Promise.resolve(null),
            canReadLifecycle
              ? ensureBusinessLifecycle(businessId)
              : Promise.resolve(null),
            canReadLifecycle
              ? getAutomaticPublicationEligibility(businessId)
              : Promise.resolve({
                  eligible: false,
                  missing: ["Your membership cannot view publication eligibility."],
                }),
            canAnalytics
              ? getBusinessAnalyticsSummary(businessId)
              : Promise.resolve({
                  periodDays: 30,
                  totalViews: 0,
                  searchAppearances: 0,
                  contactActions: 0,
                  enquiries: 0,
                  qrVisits: 0,
                }),
            getBusinessEntitlement(businessId),
          ]);'''
          if old not in content:
              raise SystemExit("Expected operations loading block was not found")
          path.write_text(content.replace(old, new, 1))
          PY

      - name: Remove one-shot workflow and commit
        shell: bash
        run: |
          rm .github/workflows/patch-operation-reads-106.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Scope private operation reads by permission [operation-read-scope]"
          git push origin HEAD:agent/development-demos-news
