name: Format homepage refinement

on:
  push:
    branches:
      - agent/homepage-local-identity-refinement

permissions:
  contents: write

concurrency:
  group: format-homepage-refinement
  cancel-in-progress: true

jobs:
  format:
    if: github.event.head_commit.message != 'Format homepage refinement'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/homepage-local-identity-refinement

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable the repository package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile

      - name: Format homepage files
        run: |
          pnpm exec prettier --write \
            src/app/page.tsx \
            src/components/home/home-refined.module.css

      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "OurValleys automation"
          git config user.email "actions@users.noreply.github.com"
          git add src/app/page.tsx src/components/home/home-refined.module.css
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format homepage refinement"
          git push origin HEAD:agent/homepage-local-identity-refinement
