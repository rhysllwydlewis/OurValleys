name: One-shot refine Phases 7-12 browser coverage

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Refine browser coverage
        run: python scripts/refine-phases-e2e-diagnostics.py
      - name: Format
        run: pnpm format
      - name: Remove one-shot helpers
        run: rm scripts/refine-phases-e2e-diagnostics.py .github/workflows/one-shot-refine-phases-e2e.yml
      - name: Commit refined coverage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refine public Phases 7-12 browser coverage"
          git push origin HEAD:agent/free-business-phases-7-12
