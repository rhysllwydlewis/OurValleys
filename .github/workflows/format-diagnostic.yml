name: Format diagnostic

on:
  push:
    branches:
      - build/stage-f-reference-data

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply formatting
        run: pnpm format
      - name: Export formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-reference-data
          path: |
            docs/27-reference-data-foundation.md
            docs/README.md
            drizzle/meta/_journal.json
            src/lib/database/schema/index.ts
            src/lib/database/schema/reference.ts
            src/modules/reference-data/business-categories.ts
            tests/integration/reference-data.test.ts
