name: Format diagnostic

on:
  push:
    branches:
      - agent/stage-h-public-save-controls
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable repository package manager
        run: corepack enable
      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate authoritative formatter patch
        run: |
          pnpm exec prettier --write tests/unit/saved-discovery-actions.test.ts
          git diff -- tests/unit/saved-discovery-actions.test.ts > format.patch
          test -s format.patch
      - name: Upload formatter patch
        uses: actions/upload-artifact@v4
        with:
          name: format-patch
          path: format.patch
          if-no-files-found: error
