name: Format diagnostic

on:
  push:
    branches:
      - agent/stage-h-event-discovery

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --write src/app/events/[eventId]/page.tsx src/app/events/page.tsx src/modules/events/public.ts tests/unit/public-events.test.ts
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-event-files
          path: |
            src/app/events/[eventId]/page.tsx
            src/app/events/page.tsx
            src/modules/events/public.ts
            tests/unit/public-events.test.ts
