name: Apply exact formatter output

on:
  push:
    paths:
      - ".github/workflows/format-diagnostic.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage-h-saved-service
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable pnpm
        run: corepack enable
      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply canonical formatting and remove diagnostic
        run: |
          pnpm exec prettier --write src/app/account/saved/page.tsx
          rm .github/workflows/format-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/account/saved/page.tsx .github/workflows/format-diagnostic.yml
          git commit -m "Fix saved page formatting"
          git push origin HEAD:agent/stage-h-saved-service
