name: Format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  generate-format-patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate authoritative Prettier patch
        run: |
          pnpm exec prettier --write \
            src/app/account/saved/actions.ts \
            'src/app/b/[businessSlug]/page.tsx' \
            src/components/saved-business-control.tsx
          git diff --binary > prettier.patch

      - name: Upload formatter output
        uses: actions/upload-artifact@v4
        with:
          name: prettier-authoritative-patch
          path: prettier.patch
          if-no-files-found: error
