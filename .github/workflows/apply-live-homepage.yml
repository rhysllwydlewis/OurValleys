name: Apply live homepage composition

on:
  push:
    branches:
      - agent/stage-h-live-homepage

permissions:
  contents: write

jobs:
  transform:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage-h-live-homepage
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/apply-live-homepage.mjs
      - run: pnpm exec prettier --write src/app/page.tsx
      - run: |
          rm scripts/apply-live-homepage.mjs
          rm .github/workflows/apply-live-homepage.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Connect homepage to live discovery composition"
          git push
