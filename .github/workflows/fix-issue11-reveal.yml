name: Fix issue 11 reveal resilience

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/issue-11-animated-homepage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Keep enhanced sections visible before intersection
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/home/home.module.css')
          content = path.read_text()
          before = '''.home[data-motion="ready"] [data-home-reveal][data-reveal-state="pending"] {
  opacity: 0;
  transform: translateY(1.5rem);
}'''
          after = '''.home[data-motion="ready"] [data-home-reveal][data-reveal-state="pending"] {
  opacity: 1;
  transform: translateY(1.5rem);
}'''
          if before not in content:
              raise SystemExit('Expected reveal rule not found')
          path.write_text(content.replace(before, after))
          PY
          rm .github/workflows/fix-issue11-reveal.yml
      - name: Commit the resilience correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep homepage content visible during reveal enhancement"
          git push origin HEAD:${{ github.head_ref }}
