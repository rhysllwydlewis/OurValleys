name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ourvalleys_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourvalleys_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      BETTER_AUTH_URL: http://127.0.0.1:3000
      AUTH_EMAIL_PASSWORD_ENABLED: "false"
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable the repository package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Generate an ephemeral authentication secret
        shell: bash
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Railway configuration
        run: node -e "JSON.parse(require('node:fs').readFileSync('railway.json', 'utf8'))"

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Check dependency compatibility
        run: pnpm compatibility

      - name: Audit high-impact dependency vulnerabilities
        run: pnpm audit --audit-level high

      - name: Apply migrations twice
        run: pnpm db:migrate && pnpm db:migrate

      - name: Seed twice
        run: pnpm db:seed && pnpm db:seed

      - name: Check worker startup
        run: pnpm worker:check

      - name: Test
        run: pnpm test

      - name: Build with configured services
        run: pnpm build

      - name: Smoke test configured services
        shell: bash
        run: |
          pnpm start > /tmp/ourvalleys-configured.log 2>&1 &
          web_pid=$!
          trap 'kill "$web_pid" || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /tmp/health-configured.json; then
              break
            fi
            sleep 1
          done
          grep -q '"status":"ok"' /tmp/health-configured.json
          curl --fail --silent http://127.0.0.1:3000/api/ready | grep -q '"status":"ready"'
          curl --fail --silent http://127.0.0.1:3000/ | grep -q "Everything local"
          curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3000/account | grep -Eq '307|308'

      - name: Build without runtime service configuration
        shell: bash
        run: |
          rm -rf .next
          env \
            -u DATABASE_URL \
            -u TEST_DATABASE_URL \
            -u BETTER_AUTH_SECRET \
            -u BETTER_AUTH_URL \
            -u AUTH_EMAIL_PASSWORD_ENABLED \
            -u NEXT_PUBLIC_SITE_URL \
            NODE_ENV=production \
            pnpm build

      - name: Smoke test unconfigured web deployment
        shell: bash
        run: |
          env \
            -u DATABASE_URL \
            -u TEST_DATABASE_URL \
            -u BETTER_AUTH_SECRET \
            -u BETTER_AUTH_URL \
            -u AUTH_EMAIL_PASSWORD_ENABLED \
            -u NEXT_PUBLIC_SITE_URL \
            NODE_ENV=production \
            PORT=3100 \
            pnpm start > /tmp/ourvalleys-unconfigured.log 2>&1 &
          web_pid=$!
          trap 'kill "$web_pid" || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3100/api/health > /tmp/health-unconfigured.json; then
              break
            fi
            sleep 1
          done
          grep -q '"status":"ok"' /tmp/health-unconfigured.json
          curl --fail --silent http://127.0.0.1:3100/ | grep -q "Everything local"
          curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3100/api/ready | grep -q '503'
          curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3100/account | grep -Eq '307|308'
          curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3100/api/auth/session | grep -q '503'
