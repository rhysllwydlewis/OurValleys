name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair-pr-107:
    if: github.head_ref == 'agent/stage-h-saved-discovery-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage-h-saved-discovery-v2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable the repository package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Upgrade Next.js and regenerate the lockfile
        shell: bash
        run: |
          git show 0b7be01281b4a057bd978b4b4764effd5556563a:.github/workflows/ci.yml > .github/workflows/ci.yml
          node <<'NODE'
          const fs = require('node:fs');
          const packagePath = 'package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.dependencies.next = '16.2.11';
          packageJson.devDependencies['eslint-config-next'] = '16.2.11';
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
          pnpm install --lockfile-only

      - name: Remove temporary audit diagnostics
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          diagnostic = (
              "      - name: Audit high-impact dependency vulnerabilities\n"
              "        shell: bash\n"
              "        run: |\n"
              "          set +e\n"
              "          pnpm audit --audit-level high --json > dependency-audit.json\n"
              "          audit_status=$?\n"
              "          cat dependency-audit.json\n"
              "          exit \"$audit_status\"\n"
          )
          standard = (
              "      - name: Audit high-impact dependency vulnerabilities\n"
              "        run: pnpm audit --audit-level high\n"
          )
          if diagnostic not in text:
              raise SystemExit('Expected temporary dependency-audit diagnostic block was not found.')
          text = text.replace(diagnostic, standard, 1)
          evidence_line = "            dependency-audit.json\n"
          if evidence_line not in text:
              raise SystemExit('Expected temporary dependency-audit artifact entry was not found.')
          text = text.replace(evidence_line, '', 1)
          path.write_text(text)
          PY
          rm -f .github/workflows/repair-pr-107.yml

      - name: Verify the repaired dependency state
        run: pnpm audit --audit-level high

      - name: Commit the repair to the PR branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml .github/workflows/ci.yml .github/workflows/repair-pr-107.yml
          git commit -m "fix: upgrade Next.js past high-severity advisories"
          git push origin HEAD:agent/stage-h-saved-discovery-v2
