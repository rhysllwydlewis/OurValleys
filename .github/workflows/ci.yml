name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ourvalleys_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourvalleys_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      BETTER_AUTH_URL: http://127.0.0.1:3000
      AUTH_EMAIL_PASSWORD_ENABLED: "false"
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable the repository package manager
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Generate an ephemeral authentication secret
        shell: bash
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Generate the initial lockfile
        id: install
        shell: bash
        run: |
          set +e
          pnpm install --no-frozen-lockfile 2>&1 | tee /tmp/pnpm-install.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Export package-manager diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-install-log
          path: /tmp/pnpm-install.log
          if-no-files-found: error
          retention-days: 1

      - name: Confirm dependency installation
        run: test "${{ steps.install.outputs.status }}" = "0"

      - name: Export generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 1

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Check dependency compatibility
        run: pnpm compatibility

      - name: Apply migrations twice
        run: pnpm db:migrate && pnpm db:migrate

      - name: Seed twice
        run: pnpm db:seed && pnpm db:seed

      - name: Check worker startup
        run: pnpm worker:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test built routes
        shell: bash
        run: |
          pnpm start > /tmp/ourvalleys-web.log 2>&1 &
          web_pid=$!
          trap 'kill "$web_pid" || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done
          grep -q '"status":"ok"' /tmp/health.json
          curl --fail --silent http://127.0.0.1:3000/ | grep -q "Everything local"
          curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3000/account | grep -Eq '307|308'
