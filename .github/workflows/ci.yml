name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ourvalleys_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourvalleys_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/ourvalleys_test
      BETTER_AUTH_URL: http://localhost:3000
      AUTH_EMAIL_PASSWORD_ENABLED: "false"
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Detect application scaffold
        id: application
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Application scaffold is not on this ref yet; CI bootstrap is healthy."
          fi

      - uses: actions/setup-node@v4
        if: steps.application.outputs.present == 'true'
        with:
          node-version-file: .node-version

      - name: Enable the repository package manager
        if: steps.application.outputs.present == 'true'
        run: corepack enable

      - name: Generate an ephemeral authentication secret
        if: steps.application.outputs.present == 'true'
        shell: bash
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Install committed dependencies
        if: steps.application.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        if: steps.application.outputs.present == 'true'
        run: pnpm format:check

      - name: Lint
        if: steps.application.outputs.present == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.application.outputs.present == 'true'
        run: pnpm typecheck

      - name: Check dependency compatibility
        if: steps.application.outputs.present == 'true'
        run: pnpm compatibility

      - name: Apply migrations
        if: steps.application.outputs.present == 'true'
        run: pnpm db:migrate

      - name: Seed the test database
        if: steps.application.outputs.present == 'true'
        run: pnpm db:seed

      - name: Test
        if: steps.application.outputs.present == 'true'
        run: pnpm test

      - name: Build
        if: steps.application.outputs.present == 'true'
        run: pnpm build
