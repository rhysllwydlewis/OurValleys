name: Temporary news typecheck

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck > temporary-news-typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: temporary-news-typecheck
          path: temporary-news-typecheck.log
          if-no-files-found: error
      - name: Fail when typecheck fails
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
