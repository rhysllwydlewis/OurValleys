name: Format homepage tests

on:
  pull_request:
    paths:
      - .github/workflows/format-homepage-tests.yml
      - tests/e2e/homepage.spec.ts
      - tests/e2e/homepage-overhaul.spec.ts

permissions:
  contents: write

concurrency:
  group: format-homepage-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/homepage-local-identity-refinement
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format homepage tests
        run: |
          pnpm exec prettier --write \
            tests/e2e/homepage.spec.ts \
            tests/e2e/homepage-overhaul.spec.ts

      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "OurValleys automation"
          git config user.email "actions@users.noreply.github.com"
          git add tests/e2e/homepage.spec.ts tests/e2e/homepage-overhaul.spec.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format homepage tests"
          git push origin HEAD:agent/homepage-local-identity-refinement
