name: One-shot capture final TypeScript diagnostics

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Capture diagnostics
        run: |
          pnpm typecheck > final-typecheck-errors.txt 2>&1 || true
          rm .github/workflows/one-shot-capture-final-typecheck.yml
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture final TypeScript diagnostics"
          git push origin HEAD:agent/free-business-phases-7-12
