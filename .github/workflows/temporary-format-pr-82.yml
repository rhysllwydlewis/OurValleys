name: Temporary PR 82 formatter

on:
  push:
    branches:
      - claude/plan-implementation-q2ym3s

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/plan-implementation-q2ym3s

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable the repository package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate

      - name: Install committed dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply the repository formatter
        run: pnpm format

      - name: Commit formatting only when required
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Formatting is already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Apply repository formatting to PR 82"
          git push origin HEAD:claude/plan-implementation-q2ym3s
