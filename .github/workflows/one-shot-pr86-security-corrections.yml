name: One-shot PR 86 security correction diagnostics

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - name: Capture correction result
        shell: bash
        run: |
          set +e
          python scripts/apply-pr86-security-corrections.py > security-correction-diagnostics.txt 2>&1
          printf '\nEXIT_CODE=%s\n' "$?" >> security-correction-diagnostics.txt
          git checkout -- src || true
      - name: Remove temporary diagnostic workflow
        run: rm .github/workflows/one-shot-pr86-security-corrections.yml
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture security correction diagnostics"
          git push origin HEAD:agent/free-business-phases-7-12
