name: Reconcile canonical branch

on:
  push:
    branches:
      - agent/stage-h-public-save-controls
    paths:
      - .github/workflows/reconcile-canonical-branch.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stage-h-public-save-controls
          fetch-depth: 0

      - name: Merge current main without rewriting history
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/reconcile-canonical-branch.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:agent/stage-h-public-save-controls
