name: Format guide diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-guides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --write src/app/guides src/modules/guides
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-guide-tree
          path: |
            src/app/guides
            src/modules/guides
