name: One-shot Phases 7-12 review fixes

on:
  push:
    branches:
      - agent/free-business-phases-7-12

permissions:
  contents: write

jobs:
  review-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/free-business-phases-7-12
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Enable package manager
        run: |
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply targeted fixes
        run: python scripts/apply-phases-7-12-review-fixes.py
      - name: Format changes
        run: pnpm format
      - name: Remove one-shot helpers
        run: rm scripts/apply-phases-7-12-review-fixes.py .github/workflows/one-shot-phases-7-12-review.yml
      - name: Commit review corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct Phases 7-12 review findings"
          git push origin HEAD:agent/free-business-phases-7-12
