name: Build development demos probe

on:
  pull_request:
  push:
    branches: [agent/development-demos-news]

permissions:
  contents: read

jobs:
  build-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/ourvalleys_probe
      BETTER_AUTH_SECRET: 0123456789abcdef0123456789abcdef
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install quietly
        shell: bash
        run: |
          corepack enable >/dev/null 2>&1
          corepack prepare pnpm@11.4.0 --activate >/dev/null 2>&1
          pnpm install --frozen-lockfile --reporter=silent >/dev/null 2>&1

      - name: Show only the build result
        shell: bash
        run: |
          set +e
          pnpm build > /tmp/ourvalleys-build.log 2>&1
          status=$?
          tail -n 70 /tmp/ourvalleys-build.log
          exit "$status"
